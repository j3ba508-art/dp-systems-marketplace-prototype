 need to test using a real email address -->

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Seller Password</title>

    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
        }
      }
    </script>

    <link rel="stylesheet" href="./seller-login.css" />
  </head>

  <body class="seller-auth-page">
    <main class="seller-auth-shell">
      <section class="seller-auth-card">
        <div class="seller-auth-brand">Seller Hub</div>
        <p class="seller-auth-kicker">Password Recovery</p>

        <h1>Reset Password</h1>
        <p class="seller-auth-subtitle">
          Enter a new password for your seller account.
        </p>

        <div id="toast"></div>

        <form id="reset-form" class="seller-auth-form" onsubmit="return false;">
          <label for="newPassword">New Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="newPassword"
              placeholder="Minimum 6 characters"
              required
            />
            <button
              type="button"
              class="toggle-password"
              data-target="newPassword"
            >
              Show
            </button>
          </div>
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Repeat new password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              data-target="confirmPassword"
            >
              Show
            </button>
          </div>

          <button type="button" id="resetPasswordBtn">Update Password</button>

          <a href="./seller-login.html" id="forgotPassword">
            Back to seller login
          </a>
        </form>
      </section>
    </main>

    <script type="module">
      import { supabase } from "./supabaseClient.js";

      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const resetPasswordBtn = document.getElementById("resetPasswordBtn");
      const toast = document.getElementById("toast");

      function showToast(message) {
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(() => {
          toast.style.display = "none";
        }, 5000);
      }

      function setButtonState(disabled) {
        resetPasswordBtn.disabled = disabled;
        resetPasswordBtn.innerText = disabled
          ? "Updating..."
          : "Update Password";
      }

      async function handlePasswordReset(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }

        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!newPassword || newPassword.length < 6) {
          showToast("Password must be at least 6 characters.");
          return;
        }

        if (newPassword !== confirmPassword) {
          showToast("Passwords do not match.");
          return;
        }

        setButtonState(true);

        const { error } = await supabase.auth.updateUser({
          password: newPassword,
        });

        if (error) {
          console.error("Password update error:", error.message);
          showToast("Could not update password. Please try again.");
          setButtonState(false);
          return;
        }

        showToast("Password updated. Redirecting to seller login...");

        setTimeout(() => {
          window.location.replace("./seller-login.html");
        }, 1500);
      }

      resetPasswordBtn.addEventListener("click", handlePasswordReset);

      document
        .getElementById("reset-form")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            handlePasswordReset(e);
          }
        });

      // SHOW/HIDE PASSWORD LISTENER
      document.querySelectorAll(".toggle-password").forEach((btn) => {
        btn.addEventListener("click", () => {
          const input = document.getElementById(btn.dataset.target);

          if (!input) return;

          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          btn.textContent = isHidden ? "Hide" : "Show";
        });
      });
    </script>
  </body>
</html>
