<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D & P Marketplace Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #070b14;
        color: #f8fafc;
      }

      .card {
        width: min(520px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 18px;
        background: #0f172a;
      }

      h1 {
        margin-top: 0;
      }

      a {
        display: block;
        margin: 12px 0;
        padding: 14px 16px;
        border-radius: 10px;
        background: #1e293b;
        color: #f8fafc;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>D & P Marketplace Test</h1>
      <p>Select a page to test:</p>

      <a href="mp.html" data-replace="mp.html">Buyer Marketplace</a>
      <a href="seller-login.html" data-replace="seller-login.html"
        >Seller Login</a
      >

      <script>
        document.querySelectorAll("[data-replace]").forEach((link) => {
          link.addEventListener("click", (event) => {
            event.preventDefault();
            window.location.replace(link.dataset.replace);
          });
        });
      </script>
    </main>
  </body>
</html>
